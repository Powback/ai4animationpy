services:
  ai4anim:
    build:
      context: .
      network: host
    dns:
      - 8.8.8.8
      - 1.1.1.1
    container_name: ai4anim
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - NO_BROWSER=1
      - PORT=7860
      - PRELOAD_DEMOS=all
      - MAX_CPU_THREADS=8
      - OMP_NUM_THREADS=8
      - MKL_NUM_THREADS=8
      - TORCH_NUM_THREADS=8
      - CLOSED_LOOP_GAIN=${CLOSED_LOOP_GAIN:-0.3}
      - CLOSED_LOOP_LAT_SIGN=${CLOSED_LOOP_LAT_SIGN:-1.0}
      - GO1_SUBSTEPS=${GO1_SUBSTEPS:-30}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai4anim.rule=Host(`ai4anim.pow`)"
      - "traefik.http.routers.ai4anim.entrypoints=web"
      - "traefik.http.services.ai4anim.loadbalancer.server.port=7860"
    networks:
      - default
      - traefik

networks:
  traefik:
    external: true
